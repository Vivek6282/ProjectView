services:
  - type: web
    name: projectview
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn --pythonpath . projectview.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false # You will provide this from Aiven
